services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-iframe-crm-app
    working_dir: /var/www/html
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:5173:5173"
    volumes:
      - ./:/var/www/html
      - composer_vendor:/var/www/html/vendor
      - bun_node_modules:/var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      BROWSER: none
      VITE_PORT: "5173"
      VITE_HOST: 0.0.0.0
    tty: true
    stdin_open: true

volumes:
  composer_vendor:
  bun_node_modules:
